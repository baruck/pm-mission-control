name: Build Desktop Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: mission-control-windows-x64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: mission-control-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build backend tests compile check
        working-directory: src-tauri
        run: cargo test --no-run

      - name: Package build outputs and source snapshot
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          cp -R README.md dist/${{ matrix.artifact_name }}/
          cp -R frontend/dist dist/${{ matrix.artifact_name }}/frontend-dist
          cp -R src-tauri dist/${{ matrix.artifact_name }}/src-tauri
          if [ -d src-tauri/target/release ]; then
            cp -R src-tauri/target/release dist/${{ matrix.artifact_name }}/release-target
          fi
          (cd dist && zip -r ${{ matrix.artifact_name }}.zip ${{ matrix.artifact_name }})

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip
